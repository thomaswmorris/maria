spectral_flux_density:
  long_name: spectral flux density
  short_name: E_e,nu
  math_name: E_{e,\nu}
  base_unit: Jy
  base_unit_prefix: ""
  vector:
    kg: 1
    s: -2
    Hz: -1
  units:
    Jy:
      factor: 1e-26
      long_name: janskies
      math_name: \text{Jy}
      aliases:
      - JY
      min_prefix_power: -30
      max_prefix_power: 30
      human: True

spectral_radiance:
  long_name: spectral radiance
  short_name: L
