
rayleigh_jeans_temperature:
  long_name: Rayleigh-Jeans temperature
  short_name: T_RJ
  math_name: T_\text{RJ}
  base_unit: K_RJ
  base_unit_prefix: ""
  vector:
    K_RJ: 1
  units:
    K_RJ:
      factor: 1
      long_name: kelvin Rayleigh-Jeans
      math_name: \text{K}_\text{RJ}
      min_prefix_power: -30
      max_prefix_power: 0



cmb_temperature_anisotropy:
  long_name: CMB temperature anisotropy
  short_name: T_CMB
  math_name: \delta \text{T}_\text{CMB}
  base_unit: K_CMB
  base_unit_prefix: "u"
  vector:
    K_CMB: 1
  units:
    K_CMB:
      factor: 1
      long_name: kelvin CMB
      math_name: \text{K}_\text{CMB}
      min_prefix_power: -30
      max_prefix_power: 0

brightness_temperature:
  long_name: brightness temperature
  short_name: T_b
  math_name: \text{T_b}
  base_unit: K_b
  base_unit_prefix: ""
  vector:
    K_b: 1
  units:
    K_b:
      factor: 1
      long_name: kelvin
      math_name: \text{K}
      min_prefix_power: -30
