  base_unit: Jy/sr
  base_unit_prefix: ""
  vector:
    kg: 1
    s: -2
    Hz: -1
    rad: -2
  units:
    Jy/sr:
      factor: 1e-26
      long_name: janskies per steradian
      math_name: \text{Jy}/\text{sr}
      min_prefix_power: -30
      max_prefix_power: 30

